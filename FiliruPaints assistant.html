
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiliruPaints Assistant</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 100%;
            max-width: 800px; /* Centered on wide screens */
            margin: 0 auto;
        }

        .msg { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 15px; 
        }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: white; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }

        /* Fixed Footer */
        #input-area { 
            background: white; 
            padding: 15px; 
            border-top: 1px solid #e2e8f0; 
            width: 100%;
        }
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }
        input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 25px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        #admin-zone { display: none; padding: 20px; background: #fff; border-top: 2px solid #000; position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: auto; z-index: 100; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="msg bot">Hello! Welcome to <strong>FiliruPaints</strong>. How can I help you with your portraits or art projects today?</div>
</div>

<div id="input-area">
    <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<div id="admin-zone">
    <h2>Admin Dashboard</h2>
    <div id="leads-list">Fetching records...</div>
    <button onclick="document.getElementById('admin-zone').style.display='none'">Close</button>
</div>

<script>
    const GEMINI_KEY = "AIzaSyDvQK-_6W7qXVyKP0aVvP6nCzusDujRMI"; 
    const SUPABASE_URL = "https://mjhkwrvxpcmababyvfrx.supabase.co";
    const SUPABASE_ANON_KEY = "PASTE_YOUR_SUPABASE_ANON_KEY_HERE";

    const bizContext = "FiliruPaints assistant for painting and portraits.";
    let chatHistory = [];

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';
        chatHistory.push("Customer: " + text);

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: bizContext + "\nHistory: " + chatHistory.join("\n") + "\nAssistant:" }] }] })
            });
            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            appendMessage(aiText, 'bot');
            chatHistory.push("Assistant: " + aiText);
        } catch (e) { console.error(e); }
    }

    function appendMessage(text, side) {
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = text;
        const container = document.getElementById('chat-container');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
