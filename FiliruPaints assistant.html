<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiliruPaints Assistant</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: white; border: 1px solid #e2e8f0; border-bottom-left-radius: 2px; }
        #input-area { padding: 15px; background: white; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 20px; outline: none; }
        button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="msg bot">Hi! How can I help you with your painting needs today?</div>
</div>

<div id="input-area">
    <input type="text" id="user-msg" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">Send</button>
</div>

<script>
    async function send() {
        const input = document.getElementById('user-msg');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = '';

        try {
            const response = await fetch(`${BACKEND_URL}/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });

            // THIS LINE IS KEY: If the status is not 200, throw an error with the details
            if (!response.ok) {
                const errorData = await response.text(); 
                throw new Error(`Server returned ${response.status}: ${errorData}`);
            }

            const data = await response.json();
            addMsg(data.response || "No response received.", 'bot');
        } catch (error) {
            // Now this will show the actual error message on your screen
            addMsg("Error: " + error.message, 'bot');
            console.error("Fetch Error:", error);
        }
    }
    }
</script>
</body>
</html>
