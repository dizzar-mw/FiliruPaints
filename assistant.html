<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiliruPaints Assistant</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: white; border: 1px solid #e2e8f0; border-bottom-left-radius: 2px; }
        #input-area { padding: 15px; background: white; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        #admin-zone { display: none; padding: 20px; background: #fff; border-top: 2px solid #000; }
        .lead-card { border-bottom: 1px solid #eee; padding: 10px 0; }
        #invisible-trigger { position: fixed; bottom: 0; right: 0; width: 30px; height: 30px; cursor: default; opacity: 0.05; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="msg bot">Hello! Welcome to <strong>FiliruPaints</strong>. I'm your AI assistant. How can I help you with your portraits or art projects today?</div>
</div>

<div id="input-area">
    <input type="text" id="user-input" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
</div>

<div id="invisible-trigger" onclick="accessAdmin()"></div>
<div id="admin-zone">
    <h2>Admin Dashboard - Customer Leads</h2>
    <div id="leads-list">Fetching records...</div>
    <button onclick="document.getElementById('admin-zone').style.display='none'">Close Admin</button>
</div>

<script>
    // Config from your screenshots
    const GEMINI_KEY = "AIzaSyDvQK-_6W7qXVyKP0aVvP6nCzusDujRMI"; 
    const SUPABASE_URL = "https://mjhkwrvxpcmababyvfrx.supabase.co";
    const SUPABASE_ANON_KEY = "PASTE_YOUR_SUPABASE_ANON_KEY_HERE"; // Find this in Supabase Project Settings > API

    const bizContext = "FiliruPaints is a service-oriented business specializing in painting, portraits, and A4 paper pencil art. You are an assistant helping customers when the owner is offline.";
    let chatHistory = [];

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';
        chatHistory.push("Customer: " + text);

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: bizContext + "\nHistory: " + chatHistory.join("\n") + "\nAssistant:" }] }] })
            });
            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            appendMessage(aiText, 'bot');
            chatHistory.push("Assistant: " + aiText);

            // Auto-save summary after 3 messages or if they mention "price", "order", or "contact"
            if (chatHistory.length >= 4 || /price|cost|order|contact|call/i.test(text)) {
                saveToSupabase();
            }
        } catch (e) { console.error(e); }
    }

    function appendMessage(text, side) {
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = text;
        document.getElementById('chat-container').appendChild(div);
        div.scrollIntoView();
    }

    async function saveToSupabase() {
        const summaryPrompt = "Summarize this customer's needs and contact info in one short sentence: " + chatHistory.join(" ");
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: summaryPrompt }] }] })
        });
        const summaryData = await res.json();
        const summary = summaryData.candidates[0].content.parts[0].text;

        await fetch(`${SUPABASE_URL}/rest/v1/FiliruPaints assistant AI`, {
            method: "POST",
            headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, "Content-Type": "application/json", "Prefer": "return=minimal" },
            body: JSON.stringify({ customer_name: "Website Visitor", summary: summary })
        });
    }

    function accessAdmin() {
        if (prompt("Enter Password") === "fisa") {
            document.getElementById('admin-zone').style.display = 'block';
            loadLeads();
        }
    }

    async function loadLeads() {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/FiliruPaints assistant AI?select=*`, {
            headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
        });
        const data = await res.json();
        document.getElementById('leads-list').innerHTML = data.map(item => `
            <div class="lead-card">
                <strong>${new Date(item.created_at).toLocaleString()}</strong><br>
                ${item.summary}
            </div>
        `).join('') || "No messages yet.";
    }
</script>
</body>
</html>
