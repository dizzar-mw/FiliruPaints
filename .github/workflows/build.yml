name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Web to APK
        # This is a working tool that replaces the deleted one
        uses: jaylyons1/web-to-apk@v1.4.0 
        with:
          app-name: "filirupaints"
          url: "https://dizzar-mw.github.io/filirupaints/"
          output-name: "filirupaints.apk"
          icon-path: "favicon.png" 

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: filirupaints-release
          path: filirupaints.apk
